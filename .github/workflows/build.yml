name: 'build and deploy docker image'

on:
  push:
    tags:
      - 'v*' # Trigger เมื่อ push tag ที่ขึ้นต้นด้วย v (เช่น v1.0.0)

jobs:
  release-docker-image-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract tag name
        run: |
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" >> ${GITHUB_ENV}
          echo "OWNER_NAME=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Verify extracted tag
        run: echo "Using TAG_NAME=${{ env.TAG_NAME }}"

      - name: Build and push Docker image
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: ${{ env.REPO_NAME }}
          registry: ghcr.io/${{ env.OWNER_NAME }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          tags: ${{ env.TAG_NAME }}, latest
